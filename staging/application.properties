# Database
spring.datasource.url=jdbc:postgresql://${APPLICATION_DATABASE_HOST}:${APPLICATION_DATABASE_PORT}/${APPLICATION_DATABASE_NAME}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${APPLICATION_DATABASE_USERNAME}
spring.datasource.password=${APPLICATION_DATABASE_PASSWORD}

# LLM
gemini.api-key=${GEMINI-API-KEY}